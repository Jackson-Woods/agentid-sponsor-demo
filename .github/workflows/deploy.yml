name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Configure npm for public registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config delete //registry.npmjs.org/:_authToken || true
      - name: Diagnostics (temporary)
        run: |
          echo "npm config (sanitized):"
          npm config list | sed -E 's#(//[^:]+:_authToken=).*#\1***#g'
          echo ""
          echo "Auth-related environment variable names:"
          env | grep -Ei '^(NPM|NODE)_|TOKEN|AUTH' | sed -E 's/=.*$/=*** (masked)/'
      - name: Install dependencies
        run: |
          # Use an empty, isolated npm userconfig so no inherited
          # ~/.npmrc / runner-level auth settings can be applied.
          ISOLATED_NPMRC="$(mktemp)"
          echo "registry=https://registry.npmjs.org/" > "$ISOLATED_NPMRC"
          # Strip any npm_config_* env vars that might inject auth
          for v in $(env | awk -F= '/^npm_config_/ {print $1}'); do unset "$v"; done
          npm ci --userconfig="$ISOLATED_NPMRC" --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
          NPM_CONFIG_USERCONFIG: ""
          NPM_CONFIG_GLOBALCONFIG: ""
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
